<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>08.03</title>
    <style>
        /* Modern, temiz ve premium fontlar */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            /* Temiz ve Premium Krem Rengi Arka Plan */
            background-color: #f4f1ea;
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ana İçerik Kartı (Zarif ve temiz) */
        .container {
            width: 85%;
            max-width: 420px;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: left;
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Gerçekçi ve Premium Lale Görseli */
        .realistic-tulip {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 25px;
            filter: brightness(0.95); /* Göze daha yumuşak gelmesi için */
        }

        /* Tipografi */
        h1.date {
            font-family: 'Playfair Display', serif;
            font-size: 2.8em;
            font-weight: 700;
            margin: 0 0 5px 0;
            letter-spacing: -1px;
            color: #1a1a1a;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2em;
            font-style: italic;
            color: #555;
            margin-bottom: 20px;
        }

        p.message {
            font-size: 0.95em;
            line-height: 1.6;
            color: #333;
            margin: 0 0 20px 0;
        }

        /* Niyeti Doğal Şekilde Belli Eden Kısım */
        .ps-note {
            font-size: 0.9em;
            line-height: 1.5;
            color: #555;
            background: #fafafa;
            border-left: 3px solid #d4af37; /* Çok ince, zarif bir altın rengi çizgi */
            padding: 12px 15px;
            border-radius: 0 8px 8px 0;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <img class="realistic-tulip" src="https://images.unsplash.com/photo-1520763185298-1b434c919102?q=80&w=600&auto=format&fit=crop" alt="Gerçek Lale">

        <h1 class="date">08.03</h1>
        <div class="title">Kadınlar Günün Kutlu Olsun, Azra.</div>

        <p class="message">
            Sıradan bir mesaj atmak yerine, böyle ufak bir jest yapmak istedim. Umarım bu küçük detay gününe tatlı bir tebessüm katar.
        </p>

        <div class="ps-note">
            Tanışmıyoruz ama bu vesileyle belki de tanışmış oluruz diye düşündüm :)
        </div>
        
    </div>

</body>
</html>
